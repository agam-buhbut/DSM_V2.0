#!/usr/sbin/nft -f
#
# DSM VPN Server Handshake-Flood Protection
# Applied before the server begins accepting, removed on shutdown.
#
# Bounds new connections (ct state new) on the listen port. Established
# flows are unaffected. Burst absorbs short spikes; sustained flood is
# dropped at the kernel layer before the server's handshake loop ever
# sees the packet.
#
# Placeholders: {SERVER_PORT}
# Replaced at runtime by the Python nftables manager.

table inet dsm_server_ratelimit {
    chain input {
        type filter hook input priority -100; policy accept;

        # UDP handshake (and post-handshake traffic, but only first packet
        # from a peer is "new" to conntrack; after that it's "established").
        udp dport {SERVER_PORT} ct state new limit rate 20/second burst 40 packets accept
        udp dport {SERVER_PORT} ct state new counter drop

        # TCP variant (TCP fallback transport).
        tcp dport {SERVER_PORT} ct state new limit rate 20/second burst 40 packets accept
        tcp dport {SERVER_PORT} ct state new counter drop
    }
}
