#!/usr/sbin/nft -f
#
# DSM VPN Kill Switch
# Applied when FSM enters ESTABLISHED, removed on TEARDOWN.
#
# Placeholders: {SERVER_IP}, {SERVER_PORT}, {TUN_NAME}
# Replaced at runtime by the Python nftables manager.

table inet dsm_killswitch {
    chain output {
        type filter hook output priority 0; policy drop;

        # Allow loopback
        oif "lo" accept

        # Allow traffic to/from VPN server (the tunnel endpoint itself)
        ip daddr {SERVER_IP} udp dport {SERVER_PORT} accept
        ip saddr {SERVER_IP} udp sport {SERVER_PORT} accept
        # TCP fallback
        ip daddr {SERVER_IP} tcp dport {SERVER_PORT} accept

        # Allow traffic through the TUN interface
        oif "{TUN_NAME}" accept

        # Allow DHCP (network connectivity)
        udp dport 67 udp sport 68 accept

        # VPN control traffic (marked)
        ct state established,related meta mark 0x1 accept

        # ICMP rate-limit (allow basic connectivity, prevent covert channels)
        meta l4proto icmp limit rate 2/second accept
        meta l4proto icmpv6 limit rate 2/second accept

        # Kill switch: drop everything else (IPv4 and IPv6)
        counter drop
    }

    chain input {
        type filter hook input priority 0; policy drop;

        # Allow loopback
        iif "lo" accept

        # Allow traffic from VPN server
        ip saddr {SERVER_IP} udp sport {SERVER_PORT} accept
        ip saddr {SERVER_IP} tcp sport {SERVER_PORT} accept

        # Allow traffic from TUN interface
        iif "{TUN_NAME}" accept

        # Allow DHCP responses
        udp sport 67 udp dport 68 accept

        # Allow established/related
        ct state established,related accept

        # ICMP rate-limit
        meta l4proto icmp limit rate 2/second accept
        meta l4proto icmpv6 limit rate 2/second accept

        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }
}

# DNS leak prevention: block all DNS and name resolution except through tunnel
table inet dsm_dns_leak {
    chain output {
        type filter hook output priority -10; policy accept;

        # Block DNS on all interfaces except TUN
        oif != "{TUN_NAME}" udp dport 53 counter drop
        oif != "{TUN_NAME}" tcp dport 53 counter drop

        # Block DoT on non-tunnel interfaces
        oif != "{TUN_NAME}" tcp dport 853 counter drop
        # Block DoQ (DNS-over-QUIC) on non-tunnel interfaces
        oif != "{TUN_NAME}" udp dport 853 counter drop

        # Block DoH: prevent HTTPS to non-server IPs on non-tunnel interfaces.
        # NOTE: This blocks ALL HTTPS on non-TUN except to the VPN server.
        # Applied only after FSM->ESTABLISHED; captive portal auth must
        # complete before the VPN connects.
        oif != "{TUN_NAME}" ip daddr != {SERVER_IP} tcp dport 443 counter drop

        # Block mDNS (multicast DNS) — leaks hostname/services to LAN
        oif != "{TUN_NAME}" udp dport 5353 counter drop
        # Block LLMNR (Link-Local Multicast Name Resolution)
        oif != "{TUN_NAME}" udp dport 5355 counter drop
    }
}
