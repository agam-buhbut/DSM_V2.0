name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/tuncore

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pyright mypy dnspython httpx types-dnspython

      - name: Build Rust crypto core
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: |
          cd rust/tuncore
          cargo build --release
          maturin develop --release

      - name: Run Rust tests
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: |
          cd rust/tuncore
          cargo test --release

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          cd rust/tuncore
          cargo audit

      - name: Run Python tests
        run: pytest tests/ -q

      - name: Type check with pyright
        run: pyright .

      - name: Type check with mypy (advisory)
        run: mypy dsm/ --ignore-missing-imports || true
